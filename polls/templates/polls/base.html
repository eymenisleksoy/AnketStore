<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AnketStore{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #8b5cf6;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --muted-text: #94a3b8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }
        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 0;
        }
        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .text-gradient {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 0.8rem 2rem;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }
        .transform-hover {
            transition: all 0.3s ease;
        }
        .transform-hover:hover {
            transform: translateY(-3px);
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ls-wide {
            letter-spacing: 0.1em;
        }
        .fw-black {
            font-weight: 900;
        }
        .shadow-2xl {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <style>
        @keyframes intense-rgb-glow {
            0% { box-shadow: 0 0 15px #ff0000, 0 0 30px rgba(255, 0, 0, 0.4); border-color: #ff0000 !important; }
            20% { box-shadow: 0 0 15px #ffff00, 0 0 30px rgba(255, 255, 0, 0.4); border-color: #ffff00 !important; }
            40% { box-shadow: 0 0 15px #00ff00, 0 0 30px rgba(0, 255, 0, 0.4); border-color: #00ff00 !important; }
            60% { box-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0, 255, 255, 0.4); border-color: #00ffff !important; }
            80% { box-shadow: 0 0 15px #0000ff, 0 0 30px rgba(0, 0, 255, 0.4); border-color: #0000ff !important; }
            100% { box-shadow: 0 0 15px #ff00ff, 0 0 30px rgba(255, 0, 255, 0.4); border-color: #ff00ff !important; }
        }
        .btn-rgb-strong {
            border: 2px solid transparent !important;
            animation: intense-rgb-glow 3s linear infinite;
            transition: all 0.3s ease;
            color: white !important;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            background: rgba(15, 23, 42, 0.8) !important;
        }
        .btn-rgb-strong:hover {
            transform: translateY(-3px) scale(1.05);
            filter: brightness(1.5) contrast(1.2);
        }
        .rgb-card {
            animation: intense-rgb-glow 3s linear infinite;
            border-width: 4px !important;
            border-style: solid !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
    </style>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'polls:index' %}" style="font-size: 2rem;">AnketStore</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center gap-2 gap-lg-4 mt-3 mt-lg-0">
                    <a class="nav-link px-4 py-2 rounded-pill btn-rgb-strong" href="{% url 'polls:trending' %}">
                        <i class="bi bi-fire me-2"></i> Trend Anketler
                    </a>
                    <a class="nav-link px-4 py-2 rounded-pill btn-rgb-strong" href="/admin/">
                        <i class="bi bi-shield-lock me-2"></i> Admin Paneli
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="mt-5 py-3 text-center text-muted border-top">
        <div class="container">
            <p>&copy; 2024 AnketStore - Tüm hakları saklıdır.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
